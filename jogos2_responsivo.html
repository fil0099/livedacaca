<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu de Jogos</title>
<style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
    }

    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
    }

    .page {
        width: 100%;
        max-width: 520px;
        position: relative;
    }

    .botao-voltar {
        position: fixed;
        top: 20px;
        left: 20px;
        background: #4db8ff;
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        z-index: 10;
        box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .botao-voltar:hover {
        background: #2ea6ff;
    }

    .container {
        background: #1e293b;
        width: 100%;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    }

    .titulo {
        margin: 0 0 16px 0;
        text-align: center;
        font-size: 22px;
        line-height: 1.2;
    }

    .botoes {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
    }

    .botoes a {
        text-decoration: none;
        display: block;
    }

    .botoes button {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 13px 14px;
        background: #22c55e;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: transform .2s ease, background .2s ease;
    }

    .botoes button:hover {
        background: #16a34a;
        transform: translateY(-1px);
    }

    .botoes button:active {
        transform: translateY(0);
    }

    @media (min-width: 768px) {
        .page {
            max-width: 640px;
        }

        .container {
            padding: 24px;
        }

        .titulo {
            font-size: 24px;
        }

        .botoes {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (min-width: 1100px) {
        .page {
            max-width: 760px;
        }

        .botoes {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 480px) {
        body {
            align-items: flex-start;
            padding-top: 76px;
        }

        .botao-voltar {
            top: 12px;
            left: 12px;
            padding: 9px 14px;
            font-size: 14px;
        }

        .container {
            padding: 16px;
            border-radius: 14px;
        }

        .titulo {
            font-size: 20px;
            margin-bottom: 14px;
        }

        .botoes button {
            font-size: 15px;
            padding: 12px 12px;
        }
    }
</style>
</head>
<body>
    <a href="index_responsivo.html" class="botao-voltar">Voltar</a>

    <main class="page">
        <section class="container" aria-label="Menu de jogos">
            <h1 class="titulo">Menu de Jogos</h1>
            <div class="botoes">
        <a href="jogoacerteoalvo.html"><button type="button">Acerte o alvo</button></a>
        <a href="jogocartas.html"><button type="button">Cartas</button></a>
        <a href="jogodacobrinha.html"><button type="button">Snake</button></a>
        <a href="jogodamemoria.html"><button type="button">Memória visual</button></a>
        <a href="jogodamemoriaa.html"><button type="button">Jogo da memória</button></a>
        <a href="jogodesviedosobstaculos.html"><button type="button">Desvie</button></a>
        <a href="jogohistoriamaluca.html"><button type="button">História Maluca</button></a>
        <a href="jogomatematica.html"><button type="button">Matemática</button></a>
        <a href="jogostop_responsivo.html">
        <button type="button">Stop</button></a>
        <a href="jogopegueoquadrado.html"><button type="button">Rapidex</button></a>
        <a href="jogoreacaoorapida.html"><button type="button">Velocidade</button></a>
        <a href="jogoreflexo.html"><button type="button">Reflexo extremo</button></a>
        <a href="jogorunner.html"><button type="button">Atravesse</button></a>
            </div>
        </section>
    </main>
</body>
</html>

<title>Untitled Document</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        background: #fff;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        position: relative;
        min-height: 100vh;
    }

    /* botão voltar */
    .botao-voltar {
        position: fixed;
        top: 16px;
        left: 16px;
        background: #4db8ff;
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        z-index: 9999;
        box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    .botao-voltar:hover {
        background: #2ea6ff;
    }

    /* área principal do mural */
    #Layer1 {
        width: min(906px, calc(100vw - 32px));
        margin: 80px auto 0;
        position: relative;
        z-index: 2;
    }

    #Layer21 {
        width: 100%;
    }

    #mmMuralRecados {
        display: block;
        width: 100%;
        height: 650px;
        border: 0;
        background: #fff;
    }

    /* fundo decorativo */
    .fundo {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
    }

    .imgfundo {
        position: absolute;
        width: 70px;
        opacity: 0.10;
        transform-origin: center;
        max-width: none;
    }

    .i1 { top: 3%; left: 5%; transform: rotate(15deg); }
    .i2 { top: 12%; left: 40%; transform: rotate(-25deg); }
    .i3 { top: 20%; left: 75%; transform: rotate(40deg); }
    .i4 { top: 28%; left: 15%; transform: rotate(-10deg); }
    .i5 { top: 35%; left: 60%; transform: rotate(30deg); }
    .i6 { top: 45%; left: 8%; transform: rotate(-35deg); }
    .i7 { top: 50%; left: 35%; transform: rotate(20deg); }
    .i8 { top: 55%; left: 80%; transform: rotate(-15deg); }
    .i9 { top: 65%; left: 20%; transform: rotate(50deg); }
    .i10 { top: 70%; left: 55%; transform: rotate(-40deg); }
    .i11 { top: 78%; left: 5%; transform: rotate(10deg); }
    .i12 { top: 82%; left: 75%; transform: rotate(-30deg); }
    .i13 { top: 90%; left: 40%; transform: rotate(25deg); }
    .i14 { top: 8%; left: 25%; transform: rotate(60deg); }
    .i15 { top: 18%; left: 55%; transform: rotate(-50deg); }
    .i16 { top: 30%; left: 85%; transform: rotate(35deg); }
    .i17 { top: 42%; left: 25%; transform: rotate(-20deg); }
    .i18 { top: 58%; left: 65%; transform: rotate(45deg); }
    .i19 { top: 73%; left: 30%; transform: rotate(-15deg); }
    .i20 { top: 88%; left: 60%; transform: rotate(30deg); }

    /* responsivo */
    @media (max-width: 1024px) {
        #Layer1 {
            width: min(1000px, calc(100vw - 24px));
            margin-top: 72px;
        }

        #mmMuralRecados {
            height: 78vh;
            min-height: 620px;
        }
    }

    @media (max-width: 768px) {
        .botao-voltar {
            top: 12px;
            left: 12px;
            padding: 9px 14px;
            font-size: 14px;
        }

        #Layer1 {
            width: calc(100vw - 16px);
            margin-top: 62px;
        }

        #mmMuralRecados {
            height: 82vh;
            min-height: 540px;
        }

        .imgfundo {
            width: 52px;
        }
    }

    @media (max-width: 480px) {
        #Layer1 {
            width: calc(100vw - 12px);
            margin-top: 56px;
        }

        #mmMuralRecados {
            height: 86vh;
            min-height: 480px;
        }

        .imgfundo {
            width: 40px;
            opacity: 0.08;
        }

        .i1 { top: 2%; left: 2%; }
        .i2 { top: 10%; left: 34%; }
        .i3 { top: 18%; left: 72%; }
        .i4 { top: 26%; left: 10%; }
        .i5 { top: 34%; left: 58%; }
        .i6 { top: 44%; left: 5%; }
        .i7 { top: 50%; left: 30%; }
        .i8 { top: 56%; left: 78%; }
        .i9 { top: 66%; left: 16%; }
        .i10 { top: 72%; left: 52%; }
        .i11 { top: 80%; left: 4%; }
        .i12 { top: 84%; left: 72%; }
        .i13 { top: 91%; left: 36%; }
        .i14 { top: 6%; left: 20%; }
        .i15 { top: 16%; left: 52%; }
        .i16 { top: 28%; left: 82%; }
        .i17 { top: 40%; left: 22%; }
        .i18 { top: 58%; left: 62%; }
        .i19 { top: 74%; left: 26%; }
        .i20 { top: 88%; left: 56%; }
    }
</style>

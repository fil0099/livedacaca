<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled Document</title>
<style type="text/css">
html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    overflow-x: hidden;
    color: #000;
}

.page {
    position: relative;
    min-height: 100vh;
    width: 100%;
}

.hero {
    width: 100%;
    max-width: 1519px;
    margin: 0 auto;
}

.hero img {
    display: block;
    width: 100%;
    height: auto;
}

.floating-logo {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 67px;
    height: auto;
    z-index: 2;
    opacity: 0.95;
}

.actions {
    position: absolute;
    top: 24px;
    left: 190px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
    z-index: 5;
}

.botao-azul, .botao {
    background: #4db8ff;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    display: inline-block;
    line-height: 1.2;
}

.botao-azul:hover, .botao:hover {
    background: #2da8ff;
    transform: scale(1.03);
}

.botao-voltar {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #4db8ff;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    z-index: 9999;
}

.botao-voltar:hover {
    background: #2ea6ff;
}

.other-games {
    position: absolute;
    top: 0;
    left: 392px;
    z-index: 5;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 999;
    padding: 16px;
    box-sizing: border-box;
}

.modal-conteudo {
    width: min(95vw, 1300px);
    position: relative;
}

.fechar {
    position: absolute;
    top: -40px;
    right: 0;
    color: white;
    font-size: 30px;
    cursor: pointer;
    user-select: none;
}

.wordwall-frame {
    width: 100%;
    height: 85vh;
    border: none;
    border-radius: 15px;
    background: white;
}

@media (max-width: 1024px) {
    .actions,
    .other-games {
        position: static;
        left: auto;
        top: auto;
    }

    .page {
        padding: 72px 16px 24px;
        box-sizing: border-box;
    }

    .hero {
        margin-top: 16px;
    }

    .actions {
        justify-content: center;
        margin: 0 auto 16px;
        width: 100%;
    }

    .other-games {
        display: block;
        margin: 0 auto 16px;
        width: fit-content;
    }

    .botao-azul, .botao {
        font-size: 17px;
        padding: 14px 22px;
    }

    .wordwall-frame {
        height: 78vh;
    }
}

@media (max-width: 768px) {
    .page {
        padding: 68px 12px 20px;
    }

    .botao-voltar {
        top: 12px;
        left: 12px;
        padding: 10px 14px;
        font-size: 16px;
    }

    .hero {
        max-width: 100%;
    }

    .actions {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
    }

    .botao-azul, .botao {
        width: 100%;
        max-width: 360px;
        margin: 0 auto;
        font-size: 16px;
        padding: 14px 18px;
        box-sizing: border-box;
        text-align: center;
    }

    .other-games {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .floating-logo {
        width: 54px;
        right: 10px;
        bottom: 10px;
    }

    .modal {
        padding: 10px;
    }

    .modal-conteudo {
        width: 100%;
    }

    .fechar {
        top: -36px;
        font-size: 28px;
    }

    .wordwall-frame {
        height: 74vh;
        border-radius: 12px;
    }
}
</style>
</head>

<body>
<a href="index_responsivo.html" class="botao-voltar">Voltar</a>

<div class="page">
    <div class="hero">
        <img src="logo2.png" alt="">
    </div>

    <div class="actions">
        <div class="botoes">
            <button class="botao-azul" onClick="abrirWordwall()">Veja sua sorte</button>
        </div>
    </div>

    <div class="other-games">
        <a href="jogos2_responsivo.html">
            <button class="botao">Outros Jogos</button>
      </a>
  </div>

    </div>

<div id="modalWordwall" class="modal">
    <div class="modal-conteudo" onClick="event.stopPropagation()">
        <div class="fechar" onClick="fecharWordwall()">×</div>
        <div id="areaJogo"></div>
    </div>
</div>

<script>
function abrirWordwall() {
    document.getElementById("modalWordwall").style.display = "flex";
    document.getElementById("areaJogo").innerHTML = `
        <iframe
        class="wordwall-frame"
        src="https://wordwall.net/embed/f1fc27884b8348bfb1fee73e4faa5b83?themeId=1&templateId=8&fontStackId=0"
        allowfullscreen>
        </iframe>
    `;
}

function fecharWordwall() {
    document.getElementById("modalWordwall").style.display = "none";
    document.getElementById("areaJogo").innerHTML = "";
}

document.getElementById("modalWordwall").onclick = function() {
    fecharWordwall();
};
</script>
</body>
</html>

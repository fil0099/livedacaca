<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Atravessar a Rua - Jogo 7</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #0b0f1a;
    font-family: Arial, sans-serif;
    touch-action: manipulation;
}

* { box-sizing: border-box; }

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    margin: 0;
    background: linear-gradient(to bottom, #111827, #0b0f1a);
}

#ui {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    color: white;
    text-align: center;
    z-index: 5;
    background: rgba(0,0,0,0.35);
    padding: 8px 14px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    font-size: 15px;
    line-height: 1.35;
    max-width: calc(100vw - 24px);
}

#start, #gameover {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 10;
    padding: 24px;
    text-align: center;
}

#start h1, #gameover h1 {
    margin: 0 0 10px;
    font-size: clamp(28px, 5vw, 46px);
}

#start p, #gameover p {
    margin: 0 0 14px;
    max-width: 420px;
    font-size: clamp(15px, 2.6vw, 18px);
    line-height: 1.4;
}

input, button {
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    outline: none;
}

input {
    width: min(320px, 100%);
    text-align: center;
}

button {
    cursor: pointer;
    background: #38bdf8;
    color: white;
    min-width: 150px;
}

button:active {
    transform: translateY(1px);
}

#rank {
    position: fixed;
    right: calc(10px + env(safe-area-inset-right));
    top: calc(10px + env(safe-area-inset-top));
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 6;
    min-width: 140px;
    max-width: 44vw;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}

#rank b {
    display: block;
    margin-bottom: 6px;
}

#board {
    line-height: 1.5;
}

@media (max-width: 768px) {
    #ui {
        font-size: 14px;
        padding: 7px 12px;
    }

    #rank {
        top: auto;
        bottom: calc(10px + env(safe-area-inset-bottom));
        right: calc(10px + env(safe-area-inset-right));
        left: 10px;
        max-width: none;
        min-width: 0;
        font-size: 13px;
    }

    #start, #gameover {
        padding: 18px;
    }

    input, button {
        width: min(100%, 320px);
        max-width: 100%;
    }
}

@media (max-width: 480px) {
    #ui {
        width: calc(100vw - 16px);
        padding: 6px 10px;
    }

    #rank {
        font-size: 12px;
        padding: 8px 10px;
    }

    button {
        min-width: 0;
        width: min(100%, 320px);
    }
}
</style>
</head>

<body>

<div id="start">
    <h1>Atravessar a Rua</h1>
    <p>Evite os carros e chegue ao outro lado.<br>Toque na tela ou use a seta para cima para avançar.</p>
    <input id="name" placeholder="Seu nome" autocomplete="off">
    <button onclick="start()">Começar</button>
</div>

<div id="gameover" style="display:none;">
    <h1>Fim de jogo</h1>
    <p id="final"></p>
    <button onclick="location.reload()">Jogar novamente</button>
</div>

<div id="ui">
    Pontos: <span id="score">0</span> |
    Fase: <span id="level">1</span>
</div>

<div id="rank">
    <b>Ranking</b>
    <div id="board"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const images = [
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0005563.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000569.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/001013.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/00404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0043434.webp"
];

let playerName = "";
let player, cars, score, level, speed, running;

let rank = JSON.parse(localStorage.getItem("street_rank") || "[]");

function start(){
    playerName = document.getElementById("name").value || "Jogador";
    document.getElementById("start").style.display = "none";

    player = {x: canvas.width/2, y: canvas.height-80, w: 40, h: 40};
    cars = [];
    score = 0;
    level = 1;
    speed = 4;
    running = true;

    spawnCars();
    loop();
}

function spawnCars(){
    if(!running) return;

    let y = Math.random() * (canvas.height - 200);

    cars.push({
        x: -100,
        y: y,
        w: 80,
        h: 50,
        img: images[Math.floor(Math.random()*images.length)]
    });

    setTimeout(spawnCars, 900);
}

document.addEventListener("keydown", e=>{
    if(!running) return;

    if(e.key === "ArrowUp") player.y -= 40;
    if(e.key === "ArrowDown") player.y += 40;
    if(e.key === "ArrowLeft") player.x -= 40;
    if(e.key === "ArrowRight") player.x += 40;
});

document.addEventListener("pointerdown", ()=>{
    if(!running) return;
    player.y -= 40;
});

function update(){
    cars.forEach(c => c.x += speed);

    cars.forEach(c=>{
        if(collide(player,c)) gameOver();
    });

    if(player.y < 0){
        score += 100;
        level++;
        speed += 1;
        player.y = canvas.height-80;
    }

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    if(player.y > canvas.height - player.h) player.y = canvas.height - player.h;

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    cars.forEach(c=>{
        let img = new Image();
        img.src = c.img;
        ctx.drawImage(img, c.x, c.y, c.w, c.h);
    });
}

function loop(){
    if(!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function collide(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
}

function gameOver(){
    running = false;

    document.getElementById("gameover").style.display = "flex";
    document.getElementById("final").innerText =
        playerName + " fez " + score + " pontos";

    rank.push({name: playerName, score});
    rank.sort((a,b)=>b.score-a.score);
    rank = rank.slice(0,5);

    localStorage.setItem("street_rank", JSON.stringify(rank));
    updateRank();
}

function updateRank(){
    document.getElementById("board").innerHTML =
        rank.map(r=> `<div>${r.name}: ${r.score}</div>`).join("");
}

updateRank();
</script>

</body>
</html>

<div id="Layer2"><!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Atravessar a Rua - Jogo 7</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #0b0f1a;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
    margin: auto;
    background: linear-gradient(to bottom, #111827, #0b0f1a);
}

#ui {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    text-align: center;
    z-index: 5;
}

#start, #gameover {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 10;
}

input, button {
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

#rank {
    position: fixed;
    right: 10px;
    top: 10px;
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 10px;
    font-size: 14px;
}
</style>

<body>

<div id="start">
    <h1>Atravessar a Rua</h1>
    <p>Evite os carros e chegue ao outro lado</p>
    <input id="name" placeholder="Seu nome">
    <button onclick="start()">Começar</button>
</div>

<div id="gameover" style="display:none;">
    <h1>Fim de jogo</h1>
    <p id="final"></p>
    <button onclick="location.reload()">Jogar novamente</button>
</div>

<div id="ui">
    Pontos: <span id="score">0</span> |
    Fase: <span id="level">1</span>
</div>

<div id="rank">
    <b>Ranking</b>
    <div id="board"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const images = [
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0005563.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000569.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/001013.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/00404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0043434.webp"
];

let playerName = "";
let player, cars, score, level, speed, running;

let rank = JSON.parse(localStorage.getItem("street_rank") || "[]");

function start(){
    playerName = document.getElementById("name").value || "Jogador";
    document.getElementById("start").style.display = "none";

    player = {x: canvas.width/2, y: canvas.height-80, w: 40, h: 40};
    cars = [];
    score = 0;
    level = 1;
    speed = 4;
    running = true;

    spawnCars();
    loop();
}

function spawnCars(){
    if(!running) return;

    let y = Math.random() * (canvas.height - 200);

    cars.push({
        x: -100,
        y: y,
        w: 80,
        h: 50,
        img: images[Math.floor(Math.random()*images.length)]
    });

    setTimeout(spawnCars, 900);
}

document.addEventListener("keydown", e=>{
    if(!running) return;

    if(e.key === "ArrowUp") player.y -= 40;
    if(e.key === "ArrowDown") player.y += 40;
    if(e.key === "ArrowLeft") player.x -= 40;
    if(e.key === "ArrowRight") player.x += 40;
});

function update(){
    cars.forEach(c => c.x += speed);

    cars.forEach(c=>{
        if(collide(player,c)) gameOver();
    });

    if(player.y < 0){
        score += 100;
        level++;
        speed += 1;
        player.y = canvas.height-80;
    }

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    cars.forEach(c=>{
        let img = new Image();
        img.src = c.img;
        ctx.drawImage(img, c.x, c.y, c.w, c.h);
    });
}

function loop(){
    if(!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function collide(a,b){
    return a.x < b.x+b.w &&
           a.x+a.w > b.x &&
           a.y < b.y+b.h &&
           a.y+a.h > b.y;
}

function gameOver(){
    running = false;

    document.getElementById("gameover").style.display = "flex";
    document.getElementById("final").innerText =
        playerName + " fez " + score + " pontos";

    rank.push({name: playerName, score});
    rank.sort((a,b)=>b.score-a.score);
    rank = rank.slice(0,5);

    localStorage.setItem("street_rank", JSON.stringify(rank));
    updateRank();
}

function updateRank(){
    document.getElementById("board").innerHTML =
        rank.map(r=> `<div>${r.name}: ${r.score}</div>`).join("");
}

updateRank();
</script>

</body>
</html></div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, obstacles, coins, score, level, gravity, gameSpeed, isGameOver;
let namePlayer = "";

const images = [
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0005563.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000569.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/001013.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/00404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0043434.webp"
];

let leaderboard = JSON.parse(localStorage.getItem("runner_scores") || "[]");

function startGame() {
    namePlayer = document.getElementById("playerName").value || "Jogador";
    document.getElementById("startScreen").style.display = "none";

    player = { x: 100, y: 300, w: 50, h: 50, vy: 0, jump: false };
    obstacles = [];
    coins = [];
    score = 0;
    level = 1;
    gravity = 0.8;
    gameSpeed = 6;
    isGameOver = false;

    loop();
    spawnObjects();
}

function spawnObjects() {
    if (isGameOver) return;

    let type = Math.random() > 0.5 ? "obstacle" : "coin";
    let img = images[Math.floor(Math.random() * images.length)];

    let obj = {
        x: canvas.width,
        y: Math.random() * (canvas.height - 100),
        w: 60,
        h: 60,
        img: img
    };

    if (type === "obstacle") obstacles.push(obj);
    else coins.push(obj);

    setTimeout(spawnObjects, 1200);
}

document.addEventListener("keydown", e => {
    if (e.code === "ArrowUp") {
        if (!player.jump) {
            player.vy = -15;
            player.jump = true;
        }
    }
});

function update() {
    player.vy += gravity;
    player.y += player.vy;

    if (player.y > canvas.height - 80) {
        player.y = canvas.height - 80;
        player.jump = false;
    }

    obstacles.forEach(o => o.x -= gameSpeed);
    coins.forEach(c => c.x -= gameSpeed);

    obstacles.forEach(o => {
        if (collision(player, o)) endGame();
    });

    coins.forEach((c, i) => {
        if (collision(player, c)) {
            score += 10;
            coins.splice(i, 1);
        }
    });

    if (score > level * 50) {
        level++;
        gameSpeed += 1;
    }

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    obstacles.forEach(o => drawImg(o));
    coins.forEach(c => drawImg(c));
}

function drawImg(o) {
    let img = new Image();
    img.src = o.img;
    ctx.drawImage(img, o.x, o.y, o.w, o.h);
}

function collision(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function loop(){
    if (isGameOver) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function endGame(){
    isGameOver = true;
    document.getElementById("gameOverScreen").style.display = "flex";
    document.getElementById("finalScore").innerText =
        namePlayer + " fez " + score + " pontos";

    leaderboard.push({ name: namePlayer, score: score });
    leaderboard.sort((a,b)=>b.score-a.score);
    leaderboard = leaderboard.slice(0,5);

    localStorage.setItem("runner_scores", JSON.stringify(leaderboard));
    updateBoard();
}

function updateBoard(){
    document.getElementById("scores").innerHTML =
        leaderboard.map(s => `<div>${s.name}: ${s.score}</div>`).join("");
}

function restart(){
    location.reload();
}

updateBoard();
</script>
</body>
</html></div>
</body>

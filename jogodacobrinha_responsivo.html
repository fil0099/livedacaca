<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jogo 8 - Snake Moderna</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0b0f1a;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #111827, #0b0f1a);
}

#ui {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    text-align: center;
    z-index: 5;
    font-size: 16px;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
}

#start, #gameover {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 10;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
}

#start h1, #gameover h1 {
    margin: 0 0 10px 0;
    font-size: clamp(24px, 5vw, 40px);
}

#start p, #gameover p {
    margin: 0;
    max-width: 520px;
    line-height: 1.4;
}

input, button {
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    box-sizing: border-box;
}

input {
    width: min(90vw, 320px);
    max-width: 320px;
}

button {
    cursor: pointer;
}

#rank {
    position: fixed;
    right: 10px;
    top: 10px;
    background: rgba(0,0,0,0.5);
    color: white;
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 12px;
    z-index: 6;
    max-width: min(40vw, 220px);
    box-sizing: border-box;
}

#board {
    margin-top: 6px;
    line-height: 1.4;
}

@media (max-width: 768px) {
    #ui {
        top: 8px;
        font-size: 14px;
        padding: 5px 8px;
    }

    #rank {
        top: auto;
        bottom: 8px;
        right: 8px;
        left: 8px;
        max-width: none;
        width: auto;
        font-size: 13px;
    }

    input, button {
        width: min(92vw, 340px);
        font-size: 16px;
    }
}

@media (max-width: 480px) {
    #ui {
        width: calc(100vw - 16px);
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
    }

    #rank {
        font-size: 12px;
        padding: 8px 10px;
    }

    #start p, #gameover p {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div id="start">
    <h1>Snake Moderna</h1>
    <p>Coma imagens, cresça e aumente sua pontuação</p>
    <input id="name" placeholder="Seu nome">
    <button onclick="start()">Começar</button>
</div>

<div id="gameover" style="display:none;">
    <h1>Fim de jogo</h1>
    <p id="final"></p>
    <button onclick="location.reload()">Jogar novamente</button>
</div>

<div id="ui">
    Pontos: <span id="score">0</span> |
    Fase: <span id="level">1</span>
</div>

<div id="rank">
    <b>Ranking</b>
    <div id="board"></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const images = [
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0005563.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000569.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/001013.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/00404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0043434.webp"
];

let snake, food, dir, score, level, speed, running, namePlayer;

let rank = JSON.parse(localStorage.getItem("snake_rank") || "[]");

function start(){
    namePlayer = document.getElementById("name").value || "Jogador";

    document.getElementById("start").style.display = "none";

    snake = [{x: 200, y: 200}];
    dir = {x: 20, y: 0};

    score = 0;
    level = 1;
    speed = 120;
    running = true;

    spawnFood();
    loop();
}

function spawnFood(){
    food = {
        x: Math.floor(Math.random()*canvas.width/20)*20,
        y: Math.floor(Math.random()*canvas.height/20)*20,
        img: images[Math.floor(Math.random()*images.length)]
    };
}

document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp") dir = {x:0,y:-20};
    if(e.key==="ArrowDown") dir = {x:0,y:20};
    if(e.key==="ArrowLeft") dir = {x:-20,y:0};
    if(e.key==="ArrowRight") dir = {x:20,y:0};
});

function update(){
    let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // colisão parede
    if(head.x < 0 || head.y < 0 || head.x > canvas.width || head.y > canvas.height){
        gameOver();
        return;
    }

    // colisão corpo
    for(let s of snake){
        if(head.x === s.x && head.y === s.y){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    // comer
    if(head.x === food.x && head.y === food.y){
        score += 10;

        if(score % 50 === 0){
            level++;
            speed = Math.max(60, speed - 10);
        }

        spawnFood();
    } else {
        snake.pop();
    }

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // comida imagem
    let img = new Image();
    img.src = food.img;
    ctx.drawImage(img, food.x, food.y, 20, 20);

    // snake
    for(let i=0;i<snake.length;i++){
        ctx.fillStyle = i===0 ? "white" : "#4ade80";
        ctx.fillRect(snake[i].x, snake[i].y, 20, 20);
    }
}

function loop(){
    if(!running) return;

    update();
    draw();

    setTimeout(loop, speed);
}

function gameOver(){
    running = false;

    document.getElementById("gameover").style.display = "flex";
    document.getElementById("final").innerText =
        namePlayer + " fez " + score + " pontos";

    rank.push({name:namePlayer, score});
    rank.sort((a,b)=>b.score-a.score);
    rank = rank.slice(0,5);

    localStorage.setItem("snake_rank", JSON.stringify(rank));
    updateRank();
}

function updateRank(){
    document.getElementById("board").innerHTML =
        rank.map(r=> `<div>${r.name}: ${r.score}</div>`).join("");
}

updateRank();
</script>

</body>
</html>

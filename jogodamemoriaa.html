<div id="Layer7"><!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória</title>

<style>

html, body {
width:100%;
height:100%;
margin:0;
padding:0;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#0b1020,#05060c);
font-family:Arial;
color:white;
}

/* CENTRALIZA TUDO */
#app{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* TELAS */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* painel */
.panel{
background:rgba(0,0,0,0.75);
padding:30px;
border-radius:20px;
}

/* BOTÕES */
button{
padding:12px 25px;
margin-top:15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#4f7cff;
color:white;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:none;
text-align:center;
}

/* JOGO CENTRAL */
#game{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* HUD */
.hud{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:15px;
}

/* TABULEIRO CENTRAL */
.board{
display:grid;
gap:10px;
justify-content:center;
align-content:center;
}

/* CARTAS */
.card{
width:90px;
height:90px;
border-radius:10px;
position:relative;
cursor:pointer;
transform-style:preserve-3d;
transition:0.5s;
}

.card.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:10px;
backface-visibility:hidden;
}

.front{
background:#111827;
}

.back{
transform:rotateY(180deg);
background-size:cover;
background-position:center;
}

.hidden{display:none;}

</style>
</head>

<body>

<div id="app">

<!-- MENU -->
<div class="screen" id="menu">
<div class="panel">
<h2>Jogo da Memória</h2>
<button onclick="showName()">Jogar</button>
</div>
</div>

<!-- NOME -->
<div class="screen hidden" id="nameScreen">
<div class="panel">
<h3>Digite seu nome</h3>
<input id="playerName">
<br>
<button onclick="startGame()">Iniciar</button>
</div>
</div>

<!-- JOGO -->
<div id="game">

<div class="hud">
<span>Jogador: <b id="pName"></b></span>
<span>Fase: <b id="level"></b></span>
<span>Tempo: <b id="time"></b></span>
</div>

<div class="board" id="board"></div>

</div>

</div>

<script>

localStorage.removeItem("ranking");

const images=[
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0005563.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/000569.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/001013.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/00404.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0043434.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/004434.webp",
"https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/0121313.webp"
];

let player="";
let first=null;
let second=null;
let lock=false;
let pairs=0;
let level=1;
let boardSize=4;
let timer;
let time=60;

/* DIFICULDADE (10 FASES) */
const sizes=[4,4,4,6,6,6,8,8,10,10];

function showName(){
menu.classList.add("hidden");
nameScreen.classList.remove("hidden");
}

function startGame(){
player=document.getElementById("playerName").value||"Jogador";

document.getElementById("nameScreen").classList.add("hidden");
document.getElementById("game").style.display="flex";

document.getElementById("pName").innerText=player;

level=1;
startLevel();
}

function startLevel(){

clearInterval(timer);

/* TEMPO REGRESSIVO */
time = 100 - (level * 10);
if(time < 10) time = 10;

boardSize=sizes[level-1];

document.getElementById("level").innerText=level;
document.getElementById("time").innerText=time+"s";

pairs=0;
first=null;
second=null;
lock=false;

let board=document.getElementById("board");
board.innerHTML="";

let total=(boardSize*boardSize)/2;

let chosen=[...images].sort(()=>Math.random()-0.5).slice(0,total);
let deck=[...chosen,...chosen].sort(()=>Math.random()-0.5);

board.style.gridTemplateColumns=`repeat(${boardSize},90px)`;

deck.forEach(img=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="front"></div>
<div class="back" style="background-image:url(${img})"></div>
`;

card.dataset.img=img;
card.onclick=()=>flip(card);

board.appendChild(card);
});

/* CONTADOR REGRESSIVO */
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time+"s";

if(time <= 0){
clearInterval(timer);
alert("Tempo acabou! Você perdeu ");
location.reload();
}

},1000);
}

function flip(card){
if(lock || card.classList.contains("flip")) return;

card.classList.add("flip");

if(!first){
first=card;
return;
}

second=card;
lock=true;

setTimeout(check,600);
}

function check(){
if(first.dataset.img===second.dataset.img){
pairs++;

first=null;
second=null;
lock=false;

if(pairs===boardSize*boardSize/2){
levelUp();
}

}else{
first.classList.remove("flip");
second.classList.remove("flip");

first=null;
second=null;
lock=false;
}
}

function levelUp(){
clearInterval(timer);

level++;

if(level>10){
alert("Parabéns! Você venceu ??");
location.reload();
return;
}

setTimeout(startLevel,800);
}

</script>

</body>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Desvio Total</title>

<style type="text/css">
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    touch-action:none;
    overscroll-behavior:none;
    -webkit-text-size-adjust:100%;
}

body{
    position:relative;
}

/* TELAS */
.screen{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:16px;
}
.screen.active{display:flex;}

/* GAME */
#gameArea{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    touch-action:none;
}

/* PLAYER */
#player{
    position:absolute;
    width:80px;
    height:80px;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    will-change:left, top;
}

/* OBSTÁCULOS */
.obstacle{
    position:absolute;
    width:70px;
    height:70px;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    will-change:top, left;
}

/* HUD */
#hud{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:10px 18px;
    border-radius:10px;
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
    max-width:calc(100vw - 24px);
    z-index:5;
    text-align:center;
}

/* BOTÃO */
button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
    margin-top:15px;
    font-size:16px;
    max-width:100%;
}

/* INPUT */
input{
    padding:10px;
    border:none;
    border-radius:6px;
    text-align:center;
    font-size:16px;
    max-width:100%;
}

/* RANKING */
#ranking{
    margin-top:20px;
    text-align:center;
}

/* RESPONSIVO */
@media (max-width: 768px){
    .screen{
        padding:20px 16px;
        justify-content:flex-start;
        padding-top:84px;
    }

    h1{
        font-size:28px;
        line-height:1.15;
        text-align:center;
    }

    h2{
        font-size:24px;
        text-align:center;
    }

    p{
        font-size:15px;
        line-height:1.5;
    }

    #hud{
        top:12px;
        padding:8px 14px;
        gap:14px;
        font-size:14px;
    }

    #player{
        width:68px;
        height:68px;
        bottom:18px;
    }

    .obstacle{
        width:58px;
        height:58px;
    }

    button, input{
        width:min(100%, 320px);
    }

    #ranking{
        width:100%;
    }
}

@media (max-width: 480px){
    .screen{
        padding:18px 12px;
        padding-top:78px;
    }

    h1{
        font-size:24px;
    }

    h2{
        font-size:21px;
    }

    #hud{
        gap:10px;
        padding:8px 12px;
        font-size:13px;
    }

    #player{
        width:60px;
        height:60px;
        bottom:14px;
    }

    .obstacle{
        width:52px;
        height:52px;
    }

    button{
        padding:11px 20px;
    }
}
</style>

</head>

<body>

<!-- MENU -->
<div class="screen active" id="menu">
    <h1>Desvie dos Objetos</h1>

    <p style="max-width:400px;text-align:center;margin:20px">
        Use o mouse ou toque para mover.<br>
        Desvie dos objetos que caem.<br>
        Sobreviva o máximo possível.
    </p>

    <button onclick="goName()">Começar</button>

    <div id="ranking"></div>
</div>

<!-- NOME -->
<div class="screen" id="name">
    <h2>Digite seu nome</h2>
    <input id="playerName">
    <button onclick="startGame()">Iniciar</button>
</div>

<!-- GAME -->
<div class="screen" id="game">

    <div id="hud">
        <div>Pontos: <span id="score">0</span></div>
        <div>Nível: <span id="level">1</span></div>
    </div>

    <div id="gameArea">
        <div id="player"></div>
    </div>

</div>

<script>

// ================= IMAGENS =================
const images = [
'https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/66.webp',
'https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/04043.webp',
'https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/4004.webp',
'https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/00404.webp',
'https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/34340.webp',
'https://raw.githubusercontent.com/fil0099/livedacaca/refs/heads/main/737313.webp'
];

// ================= VAR =================
let playerName = "";
let score = 0;
let level = 1;
let gameLoop;
let spawnLoop;
let speed = 3;
let active = false;

// ================= TELAS =================
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function goName(){
    show("name");
}

// ================= INICIAR =================
function startGame(){

    playerName = document.getElementById("playerName").value || "Jogador";

    score = 0;
    level = 1;
    speed = 3;
    active = true;

    show("game");

    const player = document.getElementById("player");
    player.style.backgroundImage = `url(${images[0]})`;

    document.getElementById("gameArea").innerHTML = "";
    document.getElementById("gameArea").appendChild(player);

    updateHUD();

    gameLoop = setInterval(updateGame, 20);
    spawnLoop = setInterval(spawnObstacle, 900);
}

// ================= PLAYER =================
document.addEventListener("mousemove", e=>{
    if(!active) return;
    const player = document.getElementById("player");
    player.style.left = (e.clientX - 40) + "px";
});

document.addEventListener("touchmove", e=>{
    if(!active) return;
    const x = e.touches[0].clientX;
    document.getElementById("player").style.left = (x - 40) + "px";
}, {passive:true});

// ================= OBSTÁCULOS =================
function spawnObstacle(){

    if(!active) return;

    const obs = document.createElement("div");
    obs.className = "obstacle";

    obs.style.left = Math.random() * (window.innerWidth - 70) + "px";
    obs.style.top = "-80px";

    obs.style.backgroundImage = `url(${images[Math.floor(Math.random()*images.length)]})`;

    document.getElementById("gameArea").appendChild(obs);
}

// ================= LOOP =================
function updateGame(){

    if(!active) return;

    const obstacles = document.querySelectorAll(".obstacle");
    const player = document.getElementById("player");

    obstacles.forEach(o=>{
        let top = parseFloat(o.style.top);
        o.style.top = (top + speed) + "px";

        // colisão
        const pRect = player.getBoundingClientRect();
        const oRect = o.getBoundingClientRect();

        if(
            pRect.left < oRect.right &&
            pRect.right > oRect.left &&
            pRect.top < oRect.bottom &&
            pRect.bottom > oRect.top
        ){
            endGame();
        }

        // saiu da tela
        if(top > window.innerHeight){
            o.remove();
            score += 10;
        }
    });

    // subir nível
    if(score % 200 === 0 && score !== 0){
        level++;
        speed += 0.5;
        updateHUD();
    }

    updateHUD();
}

// ================= HUD =================
function updateHUD(){
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

// ================= FIM =================
function endGame(){

    active = false;

    clearInterval(gameLoop);
    clearInterval(spawnLoop);

    saveScore();

    alert("Fim de jogo. Pontos: " + score);

    showRanking();
    show("menu");
}

// ================= RANKING =================
function saveScore(){

    let list = JSON.parse(localStorage.getItem("desvioRanking") || "[]");

    list.push({name: playerName, score: score});
    list.sort((a,b)=>b.score-a.score);
    list = list.slice(0,5);

    localStorage.setItem("desvioRanking", JSON.stringify(list));
}

function showRanking(){

    let list = JSON.parse(localStorage.getItem("desvioRanking") || "[]");

    document.getElementById("ranking").innerHTML =
        "<h3>Melhores Pontuações</h3>" +
        list.map(p=>`<div>${p.name} - ${p.score}</div>`).join("");
}

showRanking();

</script>

</body>
</html>

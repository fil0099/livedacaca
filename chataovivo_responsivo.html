<script>

function gerarChat4h() {

    let agora = new Date();

    let ano = agora.getFullYear();
    let mes = String(agora.getMonth() + 1).padStart(2, '0');
    let dia = String(agora.getDate()).padStart(2, '0');
    let hora = agora.getHours();

    // se for antes das 4h, usa o dia anterior
    if (hora < 4) {
        agora.setDate(agora.getDate() - 1);
        ano = agora.getFullYear();
        mes = String(agora.getMonth() + 1).padStart(2, '0');
        dia = String(agora.getDate()).padStart(2, '0');
    }

    let canal = "sitedacaca-" + ano + "-" + mes + "-" + dia;

    document.getElementById("chatContainer").innerHTML = `
        <iframe 
        src="https://tlk.io/${canal}"
        width="100%" 
        height="650"
        frameborder="0">
        </iframe>
    `;

}

gerarChat4h();

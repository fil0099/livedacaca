<div id="Layer9"><!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagem de Hoje</title>

<style>

body {
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Georgia, serif;
    background:linear-gradient(135deg, #f5f7fa, #e4ecf5);
}

/* fundo com cruz */
body::before {
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:url("https://cdn.pixabay.com/photo/2014/04/02/10/24/cross-303723_1280.png") no-repeat center;
    background-size:contain;
    opacity:0.05;
    filter:grayscale(100%);
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* card */
.card {
    width:800px;
    background:white;
    border-radius:20px;
    padding:30px 40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:fade 1s;
}

@keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}

.topo {
    display:flex;
    justify-content:space-between;
}

.titulo {
    font-size:22px;
}

.data {
    font-size:14px;
    color:#888;
}

.versiculo {
    margin:20px 0;
    font-size:20px;
    line-height:1.6;
}

.ref {
    font-size:14px;
    color:#999;
}

.btn {
    float:right;
    padding:8px 18px;
    background:#4db8ff;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover {
    background:#2ea6ff;
}

</style>
</head>

<body>

<div class="card">

<div class="topo">
<div class="titulo">Mensagem de hoje</div>
<div class="data" id="data"></div>
</div>

<div class="versiculo" id="versiculo"></div>
<div class="ref" id="ref"></div>

<button class="btn" onclick="compartilhar()">Compartilhar</button>

</div>

<script>

/* 100 versículos */
const versiculos = [
{t:"Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito.", r:"João 3:16"},
{t:"Tudo posso naquele que me fortalece.", r:"Filipenses 4:13"},
{t:"Venham a mim todos os que estão cansados.", r:"Mateus 11:28"},
{t:"Deixo-vos a paz.", r:"João 14:27"},
{t:"A fé vem pelo ouvir.", r:"Romanos 10:17"},
{t:"O amor é paciente.", r:"1 Coríntios 13:4"},
{t:"Buscai primeiro o Reino de Deus.", r:"Mateus 6:33"},
{t:"Regozijai-vos sempre.", r:"Filipenses 4:4"},
{t:"Sede fortes no Senhor.", r:"Efésios 6:10"},
{t:"Não andeis ansiosos.", r:"Filipenses 4:6"},

{t:"Quem crê tem a vida eterna.", r:"João 6:47"},
{t:"Bem-aventurados os misericordiosos.", r:"Mateus 5:7"},
{t:"Bem-aventurados os puros de coração.", r:"Mateus 5:8"},
{t:"Alegrai-vos na esperança.", r:"Romanos 12:12"},
{t:"O Senhor é fiel.", r:"2 Tessalonicenses 3:3"},
{t:"Perdoai-vos uns aos outros.", r:"Efésios 4:32"},
{t:"Andai em amor.", r:"Efésios 5:2"},
{t:"O amor nunca falha.", r:"1 Coríntios 13:8"},
{t:"Pedi e dar-se-vos-á.", r:"Mateus 7:7"},
{t:"Eu sou o caminho, a verdade e a vida.", r:"João 14:6"},

{t:"A minha graça te basta.", r:"2 Coríntios 12:9"},
{t:"Orai sem cessar.", r:"1 Tessalonicenses 5:17"},
{t:"Dai graças em tudo.", r:"1 Tessalonicenses 5:18"},
{t:"Examinai tudo.", r:"1 Tessalonicenses 5:21"},
{t:"Retende o bem.", r:"1 Tessalonicenses 5:21"},
{t:"Deus é amor.", r:"1 João 4:8"},
{t:"Nada nos separará do amor de Deus.", r:"Romanos 8:39"},
{t:"Sede pacientes.", r:"Tiago 5:8"},
{t:"Humilhai-vos perante o Senhor.", r:"Tiago 4:10"},
{t:"Chegai-vos a Deus.", r:"Tiago 4:8"},

{t:"Toda boa dádiva vem de Deus.", r:"Tiago 1:17"},
{t:"Sede praticantes da palavra.", r:"Tiago 1:22"},
{t:"A fé sem obras é morta.", r:"Tiago 2:26"},
{t:"Nada é impossível para Deus.", r:"Lucas 1:37"},
{t:"Lançai sobre Ele toda ansiedade.", r:"1 Pedro 5:7"},
{t:"Sede vigilantes.", r:"1 Pedro 5:8"},
{t:"Conhecereis a verdade.", r:"João 8:32"},
{t:"A verdade vos libertará.", r:"João 8:32"},
{t:"Permanecei no meu amor.", r:"João 15:9"},
{t:"Sem mim nada podeis fazer.", r:"João 15:5"},

{t:"A paz esteja convosco.", r:"João 20:19"},
{t:"Crê no Senhor e serás salvo.", r:"Atos 16:31"},
{t:"O justo viverá pela fé.", r:"Romanos 1:17"},
{t:"O dom de Deus é a vida eterna.", r:"Romanos 6:23"},
{t:"Transformai-vos pela renovação.", r:"Romanos 12:2"},
{t:"O amor não faz mal.", r:"Romanos 13:10"},
{t:"Tudo é lícito, mas nem tudo convém.", r:"1 Coríntios 6:12"},
{t:"Fazei tudo para glória de Deus.", r:"1 Coríntios 10:31"},
{t:"Sede firmes.", r:"1 Coríntios 15:58"},
{t:"Andamos por fé.", r:"2 Coríntios 5:7"},

{t:"Cristo nos libertou.", r:"Gálatas 5:1"},
{t:"O fruto do Espírito é amor.", r:"Gálatas 5:22"},
{t:"Levai as cargas uns dos outros.", r:"Gálatas 6:2"},
{t:"Não nos cansemos de fazer o bem.", r:"Gálatas 6:9"},
{t:"Revesti-vos do Senhor.", r:"Romanos 13:14"},
{t:"A graça do Senhor seja convosco.", r:"1 Coríntios 16:23"},
{t:"Felizes os que creem.", r:"João 20:29"},
{t:"A palavra de Deus permanece.", r:"1 Pedro 1:25"},
{t:"Resisti ao mal.", r:"Tiago 4:7"},
{t:"Sede alegres.", r:"Romanos 12:12"}
];

/* lógica */
const hoje = new Date();
const diaAno = Math.floor((hoje - new Date(hoje.getFullYear(),0,0)) / 86400000);

const v = versiculos[diaAno % versiculos.length];

document.getElementById("data").innerText = hoje.toLocaleDateString('pt-BR');
document.getElementById("versiculo").innerText = v.t;
document.getElementById("ref").innerText = v.r;

/* compartilhar */
function compartilhar(){
    const texto = v.t + " - " + v.r;

    if(navigator.share){
        navigator.share({text:texto});
    } else {
        navigator.clipboard.writeText(texto);
        alert("Copiado!");
    }
}

</script>

</body>

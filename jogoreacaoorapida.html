<div id="Layer2"><!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo 2 - Reação Rápida</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial;
}

/* TELA TOTAL */
#game{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:red;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

/* TEXTO PRINCIPAL */
#texto{
    font-size:32px;
    margin-bottom:20px;
}

/* INSTRUÇÃO */
#instrucao{
    font-size:16px;
    opacity:0.8;
    margin-bottom:30px;
}

/* BOTÃO */
#start{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#00c3ff;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<div id="game">
    <div id="texto">? Teste seu reflexo</div>

    <div id="instrucao">
        Espere a tela ficar VERDE e clique o mais rápido possível.<br>
        Se clicar antes, você perde!
    </div>

    <button id="start">? Começar</button>
</div>

<script>

let tempoInicio;
let podeClicar = false;
let timeout;
let jogoAtivo = false;

const game = document.getElementById("game");
const texto = document.getElementById("texto");
const startBtn = document.getElementById("start");

// ==========================
// INICIAR
// ==========================
startBtn.onclick = (e)=>{
    e.stopPropagation();

    jogoAtivo = true;
    podeClicar = false;

    startBtn.style.display = "none";
    texto.innerText = "Espere ficar VERDE...";
    game.style.background = "red";

    let delay = Math.random() * 3000 + 2000;

    timeout = setTimeout(()=>{
        game.style.background = "green";
        texto.innerText = "CLIQUE AGORA!";
        tempoInicio = Date.now();
        podeClicar = true;
    }, delay);
}

// ==========================
// CLIQUE NA TELA
// ==========================
game.onclick = ()=>{

    if(!jogoAtivo) return;

    if(!podeClicar){
        clearTimeout(timeout);
        texto.innerText = "?? Muito cedo!";
        finalizar();
        return;
    }

    let tempoFinal = Date.now() - tempoInicio;

    texto.innerText = "? Tempo: " + tempoFinal + " ms";
    finalizar();
}

// ==========================
// FINALIZAR
// ==========================
function finalizar(){
    jogoAtivo = false;
    podeClicar = false;

    setTimeout(()=>{
        startBtn.style.display = "block";
        startBtn.innerText = "?? Jogar novamente";
        texto.innerText = "Clique em começar";
        game.style.background = "red";
    },2000);
}

</script>

</body>
</html></div>
</body>

</body>

<div id="Layer8"><div id="contadorBox">

    <h2> Contagem para o meu Aniversário</h2>

    <div class="contador">

        <div class="tempo">
            <span id="dias">0</span>
            <p>Dias</p>
        </div>

        <div class="tempo">
            <span id="horas">0</span>
            <p>Horas</p>
        </div>

        <div class="tempo">
            <span id="minutos">0</span>
            <p>Minutos</p>
        </div>

        <div class="tempo">
            <span id="segundos">0</span>
            <p>Segundos</p>
        </div>

    </div>
</div>

<style>
#contadorBox {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffcc70, #ff6b6b);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    margin: auto;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.contador {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.tempo {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
    width: 60px;
}

.tempo span {
    font-size: 22px;
    font-weight: bold;
}

.tempo p {
    margin: 0;
    font-size: 12px;
}
</style>

<script>
function atualizarContador() {

    const agora = new Date();

    const dia = 9;
    const mes = 4; // abril

    let aniversario = new Date(
        agora.getFullYear(),
        mes - 1,
        dia,
        23,59,59
    );

    if (agora > aniversario) {
        aniversario = new Date(
            agora.getFullYear() + 1,
            mes - 1,
            dia,
            23,59,59
        );
    }

    const diferenca = aniversario - agora;

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);

    document.getElementById("dias").innerText = dias;
    document.getElementById("horas").innerText = horas;
    document.getElementById("minutos").innerText = minutos;
    document.getElementById("segundos").innerText = segundos;
}

setInterval(atualizarContador, 1000);
atualizarContador();
</script></div>

.modal {

    left: 0;

    height: 100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* conteúdo */

.modal-conteudo {
    width: 95%;
    max-width: 1300px;
    position: relative;
}

/* fechar */

.fechar {
    position: absolute;
    top: -40px;
    right: 0;
    color: white;
    font-size: 30px;
    cursor: pointer;
}

/* iframe */

.wordwall-frame {
    width: 100%;
    height: 85vh;
    border: none;
    border-radius: 15px;
    background: white;
}

</style>


<script>

function abrirWordwall() {

    document.getElementById("modalWordwall").style.display = "flex";

    document.getElementById("areaJogo").innerHTML = `
        <iframe 
        class="wordwall-frame"
        src="https://wordwall.net/embed/f1fc27884b8348bfb1fee73e4faa5b83?themeId=1&templateId=8&fontStackId=0"
        allowfullscreen>
        </iframe>
    `;
}


function fecharWordwall() {

    document.getElementById("modalWordwall").style.display = "none";
    document.getElementById("areaJogo").innerHTML = "";

}


/* clicar fora fecha */

document.getElementById("modalWordwall").onclick = function() {
    fecharWordwall();
}

</script></div>

<div id="Layer25"><div id="chatContainer"></div>

<script>

function gerarChat4h() {

    let agora = new Date();

    let ano = agora.getFullYear();
    let mes = String(agora.getMonth() + 1).padStart(2, '0');
    let dia = String(agora.getDate()).padStart(2, '0');
    let hora = agora.getHours();

    // se for antes das 4h, usa o dia anterior
    if (hora < 4) {
        agora.setDate(agora.getDate() - 1);
        ano = agora.getFullYear();
        mes = String(agora.getMonth() + 1).padStart(2, '0');
        dia = String(agora.getDate()).padStart(2, '0');
    }

    let canal = "sitedacaca-" + ano + "-" + mes + "-" + dia;

    document.getElementById("chatContainer").innerHTML = `
        <iframe 
        src="https://tlk.io/${canal}"
        width="100%" 
        height="650"
        frameborder="0">
        </iframe>
    `;

}

gerarChat4h();

</script></div>

<script>
fetch("https://noticiasdacaca.blogspot.com/feeds/posts/default?alt=json")
.then(response => response.json())
.then(data => {

    let posts = data.feed.entry;
    let container = document.getElementById("noticias");

    posts.forEach(post => {

        let titulo = post.title.$t;
        let conteudo = post.content.$t;

        container.innerHTML += `
            <div style="
                background:#fff;
                padding:15px;
                margin:20px;
                border-radius:10px;
                box-shadow:0 0 10px rgba(0,0,0,0.1);
            ">
                <h2>${titulo}</h2>
                <div>${conteudo}</div>
            </div>
        `;
    });

});
</script></div>

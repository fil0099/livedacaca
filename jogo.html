<!-- Modal -->
<div id="modalWordwall" class="modal">
    <div class="modal-conteudo" onclick="event.stopPropagation()">

        <div class="fechar" onclick="fecharWordwall()">?</div>

        <div id="areaJogo"></div>

    </div>
</div>


<style>

/* botão */

.botoes {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.botao-azul {
    background: #4db8ff;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.botao-azul:hover {
    background: #2da8ff;
    transform: scale(1.05);
}


/* modal */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* conteúdo */

.modal-conteudo {
    width: 95%;
    max-width: 1300px;
    position: relative;
}

/* fechar */

.fechar {
    position: absolute;
    top: -40px;
    right: 0;
    color: white;
    font-size: 30px;
    cursor: pointer;
}

/* iframe */

.wordwall-frame {
    width: 100%;
    height: 85vh;
    border: none;
    border-radius: 15px;
    background: white;
}

</style>


<script>

function abrirWordwall() {

    document.getElementById("modalWordwall").style.display = "flex";

    document.getElementById("areaJogo").innerHTML = `
        <iframe 
        class="wordwall-frame"
        src="https://wordwall.net/embed/f1fc27884b8348bfb1fee73e4faa5b83?themeId=1&templateId=8&fontStackId=0"
        allowfullscreen>
        </iframe>
    `;
}


function fecharWordwall() {

    document.getElementById("modalWordwall").style.display = "none";
    document.getElementById("areaJogo").innerHTML = "";

}


/* clicar fora fecha */

document.getElementById("modalWordwall").onclick = function() {
    fecharWordwall();
}

</script></div></div>
